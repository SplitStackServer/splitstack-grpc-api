syntax = "proto3";

package api;

option go_package = "github.com/SplitStackServer/splitstack-grpc-api/go/api";
option java_package = "io.splitstack.api";
option java_multiple_files = true;
option java_outer_classname = "BasestationProto";
option csharp_namespace = "SplitStackServer.Api";
option php_namespace = "SplitStackServer\\Api";
option php_metadata_namespace = "GPBMetadata\\SplitStackServer\\Api";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

import "api/common.proto";
import "common/common.proto";
import "common/metrics.proto";
import "streaming/frame.proto";

// BasestationService is the service providing API methods for managing basestations.
service BasestationService {
    // Create creates the given gateway.
    rpc CreateBasestation(CreateBasestationRequest) returns (CreateBasestationResponse) {
        option(google.api.http) = {
            post: "/api/basestations"
            body: "*"
        };
    }

    // Get returns the gateway for the given Basestation ID.
    rpc GetBasestation(GetBasestationRequest) returns (GetBasestationResponse) {
        option(google.api.http) = {
            get: "/api/basestations/{id}"
        };
    }

    // Update updates the given gateway.
    rpc UpdateBasestation(UpdateBasestationRequest) returns (UpdateBasestationResponse) {
        option(google.api.http) = {
            put: "/api/basestations/{id}"
            body: "*"
        };
    }

    // Delete deletes the gateway matching the given Basestation ID.
    rpc DeleteBasestation(DeleteBasestationRequest) returns (google.protobuf.Empty) {
        option(google.api.http) = {
            delete: "/api/basestations/{id}"
        };
    }

    // Get the list of basestations.
    rpc ListBasestations(ListBasestationsRequest) returns (ListBasestationsResponse) {
        option(google.api.http) = {
            get: "/api/basestations"
        };
    }

    // Get the list of basestations.
    rpc GetBasestationMap(GetBasestationsMapRequest) returns (GetBasestationsMapResponse) {
        option(google.api.http) = {
            get: "/api/basestations/map"
        };
    }

    // GetMetrics returns the gateway metrics.
    rpc GetBasestationMetrics(GetBasestationMetricsRequest) returns (GetBasestationMetricsResponse) {
        option(google.api.http) = {
            get: "/api/basestations/{id}/metrics"
        };
    }

    // Returns a stream of frames for the given basestation ID.
    rpc StreamBasestationFrames(StreamBasestationFramesRequest) returns (stream streaming.FrameLogItem) {
        option (google.api.http) = {
            get : "/api/basestations/{id}/frames"
        };
    }

    // Generate client-certificate for the gateway.
    rpc GenerateBasestationClientCertificate(GenerateBasestationClientCertificateRequest) returns (GenerateBasestationClientCertificateResponse) {
        option(google.api.http) = {
            post: "/api/basestations/{id}/certs/generate"
        };
    }

    // Sign a CSR for the gateway.
    rpc SignBasestationCsr(SignBasestationCsrRequest) returns (SignBasestationCsrResponse) {
        option(google.api.http) = {
            post: "/api/basestations/{id}/certs/sign"
        };
    }
    
    // Delete deletes the client certificate matching the given ID.
    rpc DeleteClientCertificate(DeleteClientCertificateRequest) returns (google.protobuf.Empty) {
        option(google.api.http) = {
            delete: "/api/basestations/{id}/certs/{cert_id}"
        };
    }

    // Get the list of basestations.
    rpc ListBasestationClientCertificates(ListBasestationClientCertificatesRequest) returns (ListBasestationClientCertificatesResponse) {
        option(google.api.http) = {
            get: "/api/basestations/{id}/certs"
        };
    }


}

enum BasestationState {
    // The gateway has never sent any data.
    BS_NEVER_SEEN = 0;

    // Online.
    BS_ONLINE = 1;

    // Offline.
    BS_OFFLINE = 2;

    // Inactive.
    BS_INACTIVE = 3;

}

message Basestation {
    // Basestation ID (UUID).
    string id = 1;

    // Basestation EUI64.
    string eui = 2;

    // Name.
    string name = 3;

    // Description.
    optional string description = 4;

    // Basestation location.
    optional common.Location location = 5;

    // Basestation metadata (set on connection).
    optional BasestationMetadata metadata = 6;

    bool use_gps_location = 7;

    bool variable_mac_support = 8;

    // Tags.
    optional common.Tags tags = 9;

    // Basestation state.
    BasestationState state = 10;

}

message BasestationListItem {
    // Tenant ID.
    string tenant_id = 1;

    // Basestation ID (UUID).
    string basestation_id = 2;

    // Basestation EUI64.
    string eui = 3;

    // Name.
    string name = 4;

    // Description.
    optional string description = 5;

    // Location.
    optional common.Location location = 6;

    // Basestation metadata (set on connection).
    optional BasestationMetadata metadata = 7;

    // Created at timestamp.
    google.protobuf.Timestamp created_at = 8;

    // Last update timestamp.
    google.protobuf.Timestamp updated_at = 9;

    // Last seen at timestamp.
    optional google.protobuf.Timestamp last_seen_at = 10;

    bool variable_mac_support = 11;

    // Basestation state.
    BasestationState state = 12;
}



message BasestationMetadata {
    // Vendor.
    optional string vendor = 1;

    // Model.
    optional string model = 2;

    // Alias.
    optional string alias = 3;

    // Software version.
    optional string sw_version = 4;
}

message CreateBasestationRequest {
    // Tenant ID.
    string tenant_id = 1;

    // Basestation EUI64.
    string eui = 2;

    // Name (defaults to EUI).
    optional string name = 3;

    // Description.
    optional string description = 4;

    // Location.
    optional common.Location location = 5;

    // Use location data provided by the basestation.
    bool use_gps_location = 6;

    // Tags.
    optional common.Tags tags = 8;
}

message CreateBasestationResponse {
    // Created Basestation object.
    Basestation basestation = 1;

    // Created at timestamp.
    google.protobuf.Timestamp created_at = 2;

}

message GetBasestationRequest {
    // Basestation ID (UUID).
    string id = 1;
}

message GetBasestationResponse {
    // Basestation object.
    Basestation basestation = 1;

	// Created at timestamp.
	google.protobuf.Timestamp created_at = 2;

	// Last update timestamp.
	google.protobuf.Timestamp updated_at = 3;

    // Last seen at timestamp.
    optional google.protobuf.Timestamp last_seen_at = 4;
}

message UpdateBasestationRequest {
    // Basestation ID (UUID).
    string id = 1;

    // Name.
    optional string name = 3;

    // Description.
    optional string description = 4;

    // Location.
    optional common.Location location = 5;

    // Use location data provided by the basestation.
    optional bool use_gps_location = 6;

    // Tags.
    optional common.Tags tags = 8;

}

message UpdateBasestationResponse {
    // Basestation object.
    Basestation basestation = 1;

	// Created at timestamp.
	google.protobuf.Timestamp created_at = 2;

	// Last update timestamp.
	google.protobuf.Timestamp updated_at = 3;
}



message DeleteBasestationRequest {
    // Basestation ID (UUID).
    string id = 1;
}

message ListBasestationsRequest {
    // Tenant ID (UUID) to filter basestations on.
    // To list all basestations as a global admin user, this field can be left blank.
    optional string tenant_id = 1;

    // Pagination. Defaults to 100 objects at page index 0.
    Paginator paginator = 2;

    // If set, the given string will be used to search on name (optional).
    optional string search_name = 3;

    // Tags to filter devices on.
    optional common.Tags tags = 4;


    enum OrderBy {
        NAME = 0;
        EUI = 1;
        LAST_SEEN_AT = 2;
        CREATED_AT = 3;  
    }

    // If set, the given value will be used to sort by (optional).
    OrderBy order_by = 6;

    // If set, the sorting direction will be decending (default = ascending) (optional).
    bool order_by_desc = 7;
}

message ListBasestationsResponse {
    // Pagination.
    Pagination pagination = 1;

    // Result-set.
    repeated BasestationListItem result = 2;
}


message GetBasestationsMapRequest {
    // Tenant ID (UUID) to filter basestations on.
    // To list all basestations as a global admin user, this field can be left blank.
    optional string tenant_id = 1;

    // Boundary of the map viewport. Only basestations within the given bounds will be returned.
    optional common.LocationBoundary bounds = 2;

    // If set, geohash prefix filter (starts-with match).
    // This is useful for zoom-dependent map queries.
    optional string geohash_prefix = 6;

    // Optional state filters. If empty, all states are included.
    repeated BasestationState state_filter = 7;

    // Optional tags to filter basestations on.
    optional common.Tags tags = 8;

    // All filters are combined using AND semantics:
    // bounds AND geohash_prefix AND state_filter AND tags.

}


message BasestationLocations {
    // Tenant ID.
    string tenant_id = 1;
    // Basestation locations.
    repeated BasestationLocation locations = 2;
}

message BasestationLocation {
    // Basestation ID (UUID).
    string basestation_id = 2;

    // Basestation EUI64.
    string eui = 3;

    // Name.
    string name = 4;

    // Location.
    optional common.GeoLocation location = 5;

    // Last seen at timestamp.
    optional google.protobuf.Timestamp last_seen_at = 6;

    // Basestation state.
    BasestationState state = 7;
}

message GetBasestationsMapResponse {
    // Basestation objects.
    repeated BasestationLocations locations = 1;
}

message GetBasestationMetricsRequest {
    // Basestation ID (UUID).
    string id = 1;

    // Interval start timestamp.
    google.protobuf.Timestamp start = 2;

    // Interval end timestamp.
    google.protobuf.Timestamp end = 3;

    // Aggregation.
    common.Aggregation aggregation = 4;
}

message GetBasestationMetricsResponse {
    // Basestation update in seconds.
    common.Metric uptime = 1;

    // CPU utilization, normalized to 1.0 for all cores.
    common.Metric cpu = 2;

    // Memory utilization, normalized to 1.0.
    common.Metric memory = 3;

    // System temperature in degree Celsius.
    common.Metric temp = 4;

    // Fraction of TX time, sliding window over one hour
    common.Metric duty_cycle = 5;

    // Number of received messages.
    common.Metric rx_count = 6;

    // Number of received variable mac messages.
    common.Metric rx_vm_count = 7;
}


message StreamBasestationFramesRequest {
  // Basestation ID (UUID).
  string id = 1;
}

message GenerateBasestationClientCertificateRequest {
    // Basestation ID (UUID).
    string id = 1;

    // Indicates if any existing certificate should be revoked.
    bool revoke_existing = 2;
}

message ClientCertificateMetadata {
    // Client certificate ID (UUID).
    string id = 1;

    // Certificate serial number.
    bytes cert_serial = 2;

    // Certificate SHA-256 fingerprint.
    bytes cert_fingerprint_sha256 = 3;

    // Expires at defines the expiration date of the certificate.
    google.protobuf.Timestamp expires_at = 4;

    // Indicates if the certificate is revoked and cannot be used for authentication.
    bool revoked = 5;

}

message GenerateBasestationClientCertificateResponse {
    // TLS certificate.
    string tls_cert = 1;

    // TLS key.
    string tls_key = 2;

    // CA certificate.
    string ca_cert = 3;

    // Certificate metadata.
    ClientCertificateMetadata metadata = 4;
}

message SignBasestationCsrRequest {
    // Basestation ID (UUID).
    string id = 1;

    // PKCS#10 CSR in PEM format.
    string csr_pem = 2;

    // Indicates if any existing certificate should be revoked.
    bool revoke_existing = 3;
}

message SignBasestationCsrResponse {
    // Signed client certificate (PEM).
    string tls_cert = 1;

    // CA certificate (PEM).
    string ca_cert = 3;

    // Certificate metadata.
    ClientCertificateMetadata metadata = 4;
}

message DeleteClientCertificateRequest {
    // Basestation ID (UUID).
    string id = 1;

    // Client certificate ID (UUID).
    string cert_id = 2;

    // Indicates if the certificate should be revoked (instead of deleted).
    optional bool revoke = 3;
}



message ListBasestationClientCertificatesRequest {
    // Basestation ID (UUID).
    string id = 1;

    // Pagination. Defaults to 100 objects at page index 0.
    Paginator paginator = 2;

    // Filter for active certificates. 
    // If set to true, only active certificates will be returned. 
    // If set to false, only inactive certificates will be returned. 
    // If not set, all certificates will be returned.
    optional bool active = 4;


    enum OrderBy {
        EXPIRES_AT = 0;
        REVOKED = 1;
    }

    // If set, the given value will be used to sort by (optional).
    OrderBy order_by = 6;

    // If set, the sorting direction will be decending (default = ascending) (optional).
    bool order_by_desc = 7;
}

message ListBasestationClientCertificatesResponse {
    // Pagination.
    Pagination pagination = 1;

    // Result-set.
    repeated ClientCertificateMetadata result = 2;
}